<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Calculator</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: #f0f4f8;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 48px;
        font-family: "Georgia", "Times New Roman", serif;
      }

      .header {
        width: 100%;
        max-width: 520px;
        text-align: center;
        margin-bottom: 28px;
      }

      .header .emoji {
        font-size: 40px;
        margin-bottom: 8px;
        line-height: 1;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #1a1a1a;
        margin: 0 0 6px;
        line-height: 1.2;
      }

      .header p {
        font-size: 17px;
        color: #555;
        line-height: 1.5;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 6px 32px rgba(0, 0, 0, 0.1);
        padding: 28px 20px;
      }

      .card label {
        display: block;
        font-size: 19px;
        font-weight: 700;
        color: #222;
        margin-bottom: 10px;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        padding: 16px;
        font-size: 20px;
        font-family: "Courier New", Courier, monospace;
        border: 3px solid #c5cfe0;
        border-radius: 14px;
        resize: vertical;
        outline: none;
        color: #111;
        line-height: 1.8;
        background: #f8faff;
        letter-spacing: 0.03em;
        transition: border-color 0.2s;
      }

      textarea:focus {
        border-color: #1d6fb8;
      }

      .btn {
        display: block;
        width: 100%;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-family: "Georgia", serif;
        font-weight: 700;
        transition: opacity 0.15s;
      }

      .btn:active {
        opacity: 0.85;
      }

      .btn-calc {
        margin-top: 18px;
        padding: 20px;
        font-size: 22px;
        background: #1d6fb8;
        color: #fff;
        box-shadow: 0 4px 14px rgba(29, 111, 184, 0.35);
      }

      .btn-clear {
        margin-top: 12px;
        padding: 18px;
        font-size: 20px;
        font-weight: 600;
        background: #fff;
        color: #c0392b;
        border: 2.5px solid #e0b0ad !important;
      }

      #result-section {
        width: 100%;
        max-width: 520px;
        margin-top: 24px;
        display: none;
      }

      .total-box {
        background: #1d6fb8;
        border-radius: 20px;
        padding: 28px 24px;
        box-shadow: 0 6px 24px rgba(29, 111, 184, 0.3);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .total-label {
        font-size: 16px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.75);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 6px;
      }

      .total-value {
        font-size: 54px;
        font-weight: 800;
        color: #fff;
        line-height: 1;
      }

      .btn-copy {
        padding: 14px 20px;
        font-size: 18px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
        border: 2px solid rgba(255, 255, 255, 0.5) !important;
        border-radius: 12px;
        cursor: pointer;
        font-family: "Georgia", serif;
        white-space: nowrap;
        transition: background 0.25s;
      }

      .btn-copy.copied {
        background: #27ae60;
      }

      .breakdown-card {
        background: #fff;
        border-radius: 20px;
        padding: 24px 20px;
        margin-top: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
      }

      .breakdown-title {
        font-size: 19px;
        font-weight: 700;
        color: #222;
        margin-bottom: 16px;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 10px;
      }

      .line-row {
        border-radius: 12px;
        border: 1.5px solid #e8eef8;
        padding: 14px 16px;
        margin-bottom: 10px;
      }

      .line-row:nth-child(odd) {
        background: #f4f8ff;
      }
      .line-row:nth-child(even) {
        background: #fff;
      }

      .line-text {
        font-size: 17px;
        font-family: "Courier New", Courier, monospace;
        color: #333;
        margin-bottom: 8px;
        word-break: break-all;
        line-height: 1.5;
      }

      .wp-badge {
        display: inline-block;
        font-size: 13px;
        font-weight: 700;
        padding: 2px 9px;
        border-radius: 999px;
        margin-left: 8px;
        background: #dbeafe;
        color: #1d4ed8;
        vertical-align: middle;
      }

      .ab-badge {
        display: inline-block;
        font-size: 13px;
        font-weight: 700;
        padding: 2px 9px;
        border-radius: 999px;
        margin-left: 8px;
        background: #fef9c3;
        color: #854d0e;
        vertical-align: middle;
      }

      .line-math {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .line-formula {
        font-size: 17px;
        color: #666;
        font-family: "Georgia", serif;
      }

      .line-total {
        font-size: 22px;
        font-weight: 800;
        color: #1d6fb8;
      }

      .grand-total {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 6px;
        padding: 14px 16px;
        background: #1d6fb8;
        border-radius: 12px;
      }

      .grand-total-label {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
      }
      .grand-total-value {
        font-size: 28px;
        font-weight: 800;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="emoji">🧮</div>
      <h1>Calculator</h1>
      <p>Type or paste your numbers below</p>
    </div>

    <div class="card">
      <label for="input">Enter your numbers:</label>
      <textarea
        id="input"
        placeholder="43*93*(75)wp&#10;48--98-(50)wp&#10;47--42*(35)wp"
        spellcheck="false"
        autocapitalize="none"
        autocorrect="off"
      ></textarea>

      <button class="btn btn-calc" onclick="handleCalculate()">
        ✅ Calculate
      </button>
      <button class="btn btn-clear" onclick="handleClear()">🗑 Clear</button>
    </div>

    <div id="result-section">
      <div class="total-box">
        <div>
          <div class="total-label">Total Amount</div>
          <div class="total-value" id="total-value">0</div>
        </div>
        <button class="btn-copy" id="copy-btn" onclick="handleCopy()">
          📋 Copy
        </button>
      </div>

      <div class="breakdown-card" id="breakdown-card"></div>
    </div>

    <script>
      function reverseNumber(num) {
        return parseInt(
          String(num).padStart(2, "0").split("").reverse().join(""),
          10
        );
      }

      function normalizePair(num) {
        const reversed = reverseNumber(num);
        return [num, reversed].sort().join("-");
      }

      function countSegment(allNumbers, isWP) {
        if (!isWP) return new Set(allNumbers).size;
        const seenPairs = new Set();
        let count = 0;
        for (const num of allNumbers) {
          const key = normalizePair(num);
          if (!seenPairs.has(key)) {
            seenPairs.add(key);
            count += num === reverseNumber(num) ? 1 : 2;
          }
        }
        return count;
      }

      // For x-format: split every digit block into 2-digit pairs.
      // e.g. "8307" → [83, 07], "735909" → [73, 59, 09]
      function extractPairedNumbers(text) {
        const allNumbers = [];
        for (const block of text.match(/\d+/g) || []) {
          if (block.length === 1) continue;
          if (block.length === 2) {
            allNumbers.push(Number(block));
          } else {
            for (let i = 0; i + 1 < block.length; i += 2) {
              allNumbers.push(Number(block.slice(i, i + 2)));
            }
          }
        }
        return allNumbers;
      }

      // Suffix "ab/AB/a/b" after the rate in any format → count × 2
      function processLine(line) {
        const trimmed = line.trim();
        if (!trimmed) return [];

        const results = [];

        // --- Paren format: numbers(rate)[suffix] ---
        // Suffix letters: "wp" → WP mode, "a"/"b"/"ab" → double the count
        const parenPattern = /([^()]*)\((\d+)\)\s*([a-zA-Z]*)/gi;
        let match;

        while ((match = parenPattern.exec(trimmed)) !== null) {
          const numbersPart = match[1];
          const suffix = match[3] || "";
          const isWP = /wp/i.test(suffix);
          const isDouble = /[ab]/i.test(suffix);
          const rate = parseInt(match[2], 10);
          const allNumbers = (
            numbersPart.match(/(?<!\d)\d{2}(?!\d)/g) || []
          ).map(Number);
          if (allNumbers.length === 0) continue;
          const count = countSegment(allNumbers, isWP) * (isDouble ? 2 : 1);
          if (count > 0) {
            const displayText = numbersPart
              .replace(/^[\s*\-_.,:|]+|[\s*\-_.,:|]+$/g, "")
              .trim();
            results.push({
              line: displayText || numbersPart.trim(),
              rate,
              isWP,
              isDouble,
              count,
              lineTotal: count * rate,
            });
          }
        }
        if (results.length > 0) return results;

        // --- X format: [prefix?][numbers]x[rate][suffix] ---
        const xPattern = /([^x]*)x(\d+)\s*([a-zA-Z]*)/gi;

        while ((match = xPattern.exec(trimmed)) !== null) {
          const numbersPart = match[1];
          const suffix = match[3] || "";
          const isWP = /wp/i.test(suffix);
          const isDouble = /[ab]/i.test(suffix);
          const rate = parseInt(match[2], 10);
          const allNumbers = extractPairedNumbers(numbersPart);
          if (allNumbers.length === 0) continue;
          const count = countSegment(allNumbers, isWP) * (isDouble ? 2 : 1);
          if (count > 0) {
            const displayText = numbersPart
              .replace(/^\D+/, "")
              .replace(/\D+$/, "")
              .trim();
            results.push({
              line: displayText || numbersPart.trim(),
              rate,
              isWP,
              isDouble,
              count,
              lineTotal: count * rate,
            });
          }
        }
        if (results.length > 0) return results;

        // --- Plain format: last number = rate, any text after last number = WP / double ---
        // Only applies when the line has a comma — e.g. "02,04,07,09,,,40 पलटके साथ"
        if (/,/.test(trimmed)) {
          const allMatches = [...trimmed.matchAll(/\d+/g)];
          if (allMatches.length >= 2) {
            const lastMatch = allMatches[allMatches.length - 1];
            const baseRate = Number(lastMatch[0]);
            const lastMatchEnd = lastMatch.index + lastMatch[0].length;
            const afterText = trimmed.slice(lastMatchEnd);
            const isDouble = /[ab]/i.test(afterText);
            // WP if there's non-whitespace text that isn't just a/b letters
            const isWP =
              /\S/.test(afterText) && !/^[ab\s]+$/i.test(afterText.trim());
            const rate = baseRate;
            const textBeforeRate = trimmed.slice(0, lastMatch.index);
            const allNumbers = extractPairedNumbers(textBeforeRate);
            if (allNumbers.length > 0) {
              const count = countSegment(allNumbers, isWP) * (isDouble ? 2 : 1);
              if (count > 0) {
                const displayText = textBeforeRate
                  .replace(/[,\s.]+$/, "")
                  .trim();
                results.push({
                  line: displayText || textBeforeRate.trim(),
                  rate,
                  isWP,
                  isDouble,
                  count,
                  lineTotal: count * rate,
                });
              }
            }
          }
        }

        return results;
      }

      function preprocessText(text) {
        // Handles timestamps like [14:26, 12/04/2026] and [6:16 pm, 12/04/2026]
        // Sender can be a phone number (+91 93513 40631) or a contact name (John, राहुल)
        return text.replace(/\[[^\]]*\]\s*[^:]+:\s*/g, "\n").trim();
      }

      function calculateTotal(text) {
        const cleaned = preprocessText(text);

        // Merge rate-less lines (no paren rate, no x-rate, no comma) into the next rated line.
        // e.g. "53...54...58\n03...08(25)wp" → "53...54...58 03...08(25)wp"
        const rawLines = cleaned
          .split("\n")
          .map((l) => l.trim())
          .filter(Boolean);
        const mergedLines = [];
        let pending = "";

        for (const line of rawLines) {
          const hasExplicitRate = /\(\d+\)/.test(line) || /x\d+/i.test(line);
          const hasCommaRate = /,/.test(line);
          if (!hasExplicitRate && !hasCommaRate) {
            pending = pending ? pending + " " + line : line;
          } else {
            mergedLines.push(pending ? pending + " " + line : line);
            pending = "";
          }
        }
        if (pending) mergedLines.push(pending);

        const results = mergedLines.flatMap(processLine);
        return { results, total: results.reduce((s, r) => s + r.lineTotal, 0) };
      }

      let currentTotal = 0;

      function handleCalculate() {
        const text = document.getElementById("input").value;
        const { results, total } = calculateTotal(text);
        currentTotal = total;

        document.getElementById("total-value").textContent = total;
        document.getElementById("result-section").style.display = "block";

        const copyBtn = document.getElementById("copy-btn");
        copyBtn.textContent = "📋 Copy";
        copyBtn.classList.remove("copied");

        const card = document.getElementById("breakdown-card");

        if (results.length === 0) {
          card.innerHTML = "";
          return;
        }

        let html = '<div class="breakdown-title">Line by Line</div>';

        results.forEach((r, i) => {
          html += `
          <div class="line-row">
            <div style="display:flex;align-items:flex-start;gap:12px;">
              <span style="min-width:28px;height:28px;border-radius:50%;background:#1d6fb8;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">${
                i + 1
              }</span>
              <div style="flex:1;min-width:0;">
                <div class="line-text">
                  ${escapeHtml(r.line)}
                  ${r.isWP ? '<span class="wp-badge">WP</span>' : ''}
                  ${r.isDouble ? '<span class="ab-badge">AB</span>' : ''}
                </div>
                <div class="line-math">
                  <span class="line-formula">${r.count} × ${r.rate}</span>
                  <span class="line-total">= ${r.lineTotal}</span>
                </div>
              </div>
            </div>
          </div>`;
        });

        html += `
        <div class="grand-total">
          <span class="grand-total-label">Grand Total</span>
          <span class="grand-total-value">${total}</span>
        </div>`;

        card.innerHTML = html;
      }

      function handleClear() {
        document.getElementById("input").value = "";
        document.getElementById("result-section").style.display = "none";
        currentTotal = 0;
      }

      function handleCopy() {
        navigator.clipboard.writeText(String(currentTotal)).then(() => {
          const btn = document.getElementById("copy-btn");
          btn.textContent = "✓ Copied";
          btn.classList.add("copied");
          setTimeout(() => {
            btn.textContent = "📋 Copy";
            btn.classList.remove("copied");
          }, 2500);
        });
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
